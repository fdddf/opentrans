# Global configuration settings
global:
  input_file: "Localizable.xcstrings"
  output_file: "Localizable_translated.xcstrings"
  source_language: "en"
  target_languages:
    - "zh-Hans"
    - "ja"
    - "ko"
  concurrency: 5
  verbose: false

# Google Translate API configuration
google:
  api_key: "your-google-api-key-here"
  model: "nmt"
  glossary: ""

# DeepL API configuration
deepl:
  api_key: "your-deepl-api-key-here"
  is_free: false
  formality: "default"

# Baidu Translate API configuration
baidu:
  app_id: "your-baidu-app-id-here"
  app_secret: "your-baidu-app-secret-here"

# OpenAI compatible API configuration
openai:
  api_key: "your-openai-api-key-here"
  api_base_url: "https://api.openai.com"
  model: "gpt-3.5-turbo"
  temperature: 0.3
  max_tokens: 1024

# Llama local model configuration
llama:
  lib_path: "/data/dev/yzma/lib/"
  model_path: "/data/dev/opentrans/backend/models/HY-MT1.5-1.8B-Q4_K_M.gguf"
  threads: 4
  seed: -1
  tokens: 4096
  top_k: 20
  tfs: 1.0
  top_p: 0.6
  min_p: 0.1
  typical_p: 1.0
  repeat_last_n: 64
  repeat_penalty: 1.05
  frequency_penalty: 0.0
  presence_penalty: 0.0
  temperature: 0.7
  verbose: false
